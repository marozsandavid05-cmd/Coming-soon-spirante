<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- JS-jelenlet jelzo: a rejtett-indulas CSS CSAK ezzel aktiv. No-JS -> minden tartalom latszik. -->
<script>document.documentElement.className += ' js';</script>
<title>ICON Spirante IX · Hamarosan</title>
<meta name="description" content="ICON Spirante IX prémium spritz. Hamarosan: 2026. július 20.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- above-fold split keyartok preload (LCP): avif elsokent -->
<link rel="preload" as="image" type="image/avif" href="media/keyart-750left-825.avif" fetchpriority="high">
<link rel="preload" as="image" type="image/avif" href="media/coming-split-right.avif" fetchpriority="high">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ICON SPIRANTE IX — Split Underground
   Art direction: Noir Luxe (#25) x Street/Urban. Fekete + arany, egy akcent.
   Statikus coming-soon: nincs scroll-motor, a kritikus vizual sosem fugg JS-tol.
   ============================================================ */
:root{
  --paper:#0A0908;          /* ink-fekete alap */
  --paper-2:#13100c;        /* emelt felulet */
  --ink:#F4EFE4;            /* krem szoveg */
  --muted:#9A8D74;          /* tort taupe */
  --gold:#A9781A;           /* arany alap */
  --gold-bright:#E7B53F;    /* arany csucsfeny */
  --line:rgba(244,239,228,.12);
  --font-display:'Cinzel',Georgia,'Times New Roman',serif;   /* David valasztas (Aurora 750 tipo 2.kor): monumentalis romai kapitalis, HU-safe (Ő/Ű OK) */
  --font-body:'Jost',system-ui,sans-serif;
  --font-script:'Pinyon Script',cursive;
  --font-graf:'Rubik Wet Paint',system-ui,cursive;
  --pad:clamp(1.4rem,5vw,6rem);
  --maxw:1280px;
  --ease:cubic-bezier(.16,1,.3,1);
  --step-hero:clamp(3.2rem,12vw,11rem);
  --step-3:clamp(2rem,5vw,3.6rem);
  --step-2:clamp(1.4rem,3vw,2.1rem);
  --tl-x:clamp(1.4rem,4vw,3.2rem);   /* bottle timeline x-position */
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased;scroll-behavior:auto;overflow-x:clip}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:clamp(1rem,1.05vw,1.0625rem);line-height:1.65;overflow-x:clip}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:500;line-height:1.08;letter-spacing:.015em;font-optical-sizing:auto}   /* Cinzel: romai kapitalis -> enyhe pozitiv tracking + lazabb sortav (caps nem tapadhat) */
/* Cinzel: monumentalis romai kapitalis display, HU-safe (Ő/Ű), luxus editorial karakter */
h1,h2,h3,h4{font-variation-settings:"SOFT" 0,"WONK" 0}
h1 em,h2 em,h3 em,h4 em,.hero__title em{font-variation-settings:"SOFT" 28,"WONK" 1}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
.wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--pad)}
section{padding-block:clamp(4.5rem,13vh,11rem)}
.eyebrow{font-family:var(--font-body);font-weight:500;font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:var(--gold-bright)}
.gold-text{color:var(--gold-bright)}
.script{font-family:var(--font-script);color:var(--gold-bright);font-weight:400}

/* ============ LOADER ============ */
.loader{position:fixed;inset:0;background:var(--paper);display:grid;place-items:center;z-index:9999;transition:opacity .7s ease}
.loader.is-done{opacity:0;pointer-events:none}
/* JS nelkul nincs, ami eltuntesse a loadert -> ne is jelenjen meg (no-JS fallback) */
html:not(.js) .loader{display:none}
.loader__mark{text-align:center}
.loader__mark .lo-brand{font-family:var(--font-body);letter-spacing:.4em;font-size:.7rem;color:var(--muted);text-transform:uppercase}
.loader__mark .lo-ix{font-family:var(--font-display);font-size:clamp(3rem,10vw,7rem);color:var(--gold-bright);line-height:1;margin-top:.4rem}
.loader__bar{width:min(46vw,260px);height:1px;background:var(--line);margin:1.6rem auto 0;overflow:hidden}
.loader__bar i{display:block;height:100%;width:0;background:var(--gold-bright)}
/* ha a korkapu aktiv, a betolto-sav rejtve (a gate veszi at) */
.loader.age-gate-on .loader__bar{display:none}

/* ============ KORKAPU (AGE-GATE): fekete + arany, Cinzel cim ============ */
.agegate{margin-top:2.2rem;width:min(92vw,420px);text-align:center}
.agegate[hidden]{display:none}
.agegate__lead{font-family:var(--font-body);font-size:.92rem;color:var(--ink);opacity:.86;margin-bottom:1.4rem;letter-spacing:.01em}
.agegate__fields{display:flex;gap:.8rem;justify-content:center}
.agegate__f{display:flex;flex-direction:column;gap:.5rem;text-align:left}
.agegate__f span{font-family:var(--font-body);font-size:.62rem;letter-spacing:.26em;text-transform:uppercase;color:var(--muted)}
.agegate__in{width:100%;background:rgba(244,239,228,.04);border:1px solid var(--line);border-radius:6px;
  color:var(--ink);font-family:var(--font-display);font-size:1.5rem;text-align:center;padding:.7rem .4rem;
  letter-spacing:.06em;transition:border-color .25s var(--ease),box-shadow .25s var(--ease);outline:none}
.agegate__f:nth-child(1) .agegate__in{width:6.4rem}
.agegate__f:nth-child(2) .agegate__in,.agegate__f:nth-child(3) .agegate__in{width:4rem}
.agegate__in::placeholder{color:rgba(154,141,116,.5);font-size:1rem;letter-spacing:.1em}
.agegate__in:focus{border-color:var(--gold-bright);box-shadow:0 0 0 1px rgba(231,181,63,.4)}
.agegate__in.is-bad{border-color:#c0563f;box-shadow:0 0 0 1px rgba(192,86,63,.4)}
.agegate__err{min-height:1.3rem;margin-top:1rem;font-family:var(--font-body);font-size:.82rem;color:#e08a73;letter-spacing:.01em}
.agegate__btn{margin-top:1.1rem;display:inline-flex;align-items:center;justify-content:center;gap:.6rem;
  padding:.9rem 2.4rem;border:1px solid var(--gold-bright);border-radius:100px;background:transparent;cursor:pointer;
  font-family:var(--font-body);font-size:.74rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-bright);
  transition:background .3s var(--ease),color .3s var(--ease)}
.agegate__btn:hover{background:var(--gold-bright);color:var(--paper)}
.agegate__btn:focus-visible{outline:2px solid var(--gold-bright);outline-offset:3px}
.agegate__legal{margin-top:1.6rem;font-family:var(--font-body);font-size:.66rem;line-height:1.7;color:var(--muted);max-width:34ch;margin-inline:auto}
@media(max-width:440px){
  .agegate__fields{gap:.5rem}
  .agegate__f:nth-child(1) .agegate__in{width:5.2rem}
  .agegate__f:nth-child(2) .agegate__in,.agegate__f:nth-child(3) .agegate__in{width:3.2rem}
}
/* a korkapu alatt a torzs nem gorgetheto */
body.age-locked{overflow:hidden}

/* =========================================================
   LANDING — atlos split chooser
   ========================================================= */
.landing{position:relative;min-height:100svh;background:var(--paper)}
.js .landing{position:fixed;inset:0;z-index:90;min-height:0;height:100svh;transition:opacity .6s ease,visibility .6s}
.landing--gone{opacity:0;visibility:hidden;pointer-events:none}
.half{position:absolute;inset:0;display:block;overflow:hidden;cursor:default;color:var(--ink)}
.half__bg{position:absolute;inset:0;z-index:0}
.half__bg img{width:100%;height:100%;object-fit:cover;transition:transform 1.1s var(--ease),filter 1.1s var(--ease)}
.half__scrim{position:absolute;inset:0;z-index:1;transition:opacity .9s var(--ease)}
.half__content{position:absolute;z-index:2;display:flex;flex-direction:column;gap:.7rem;max-width:min(80vw,30rem)}
/* SZLOGENEK (David referencia 07-13): KEZZEL FESTETT arany brush-lettering KEPKENT (Higgsfield gen,
   brand-konstans: arany #D9A441/#B07C2E/#7A5320, drip). Nem renderelt font — a fontos headline-ok kepek. */
.slogan__img{display:block;height:auto;filter:drop-shadow(0 10px 28px rgba(0,0,0,.6))}
.half--bottle .slogan__img{width:min(27vw,430px)}
.half--can .slogan__img{width:min(26vw,420px);margin-left:auto}

.half--can{z-index:1}
.half--bottle{z-index:2}

/* Uveges fel: jobb-fent (atlo folott) */
/* Aurora ref: dolt kozel-fuggoleges vagas (top 55% -> bottom 41%), NEM sarok-haromszog -> ember+termek MINDKET felen elfer */
.half--bottle{clip-path:polygon(0 0,55% 0,46% 100%,0 100%)}
/* Aurora FEL-PANEL technika: a bg a bal PANELT fedi (~56%), NEM a teljes viewportot -> a portre a fel-panel szelesseget tolti, a palack a seamtol el (nincs nyujtas/homaly) */
.half--bottle .half__bg{left:0;right:auto;width:56%}
/* uveges fel MOST bal-lent: a leopardos plakat kozep-bal magja (ferfi arc + parduc + uveg) a lathato ekbe huzva */
/* Aurora dedikalt ALLO crop (chooser-750-left-portrait.png 1100x1400), a subject BALRA komponalva -> object-fit:cover + object-position 40% 50% (palack hajszallal a seamtol el, ferfi+parduc balra), NULLA zoom (cover csak lefele skalaz -> eles, 0 felskalazas). A HERO (szeles) marad hf. */
.half--bottle .half__bg img{object-fit:cover;object-position:35% 50%}   /* Aurora spec (desktop wide crop); mobil override 50% 46% a mobil blokkban */
/* ref scrimL: lokalis folt a bal-also sarokba (szoveg mogott), NEM globalis sotetites */
.half--bottle .half__scrim{background:radial-gradient(120% 90% at 10% 92%,rgba(10,9,8,.88) 0%,rgba(10,9,8,.38) 42%,transparent 66%)}
.half--bottle .half__content{bottom:clamp(2.6rem,6.5vh,4.5rem);left:var(--pad);text-align:left;align-items:flex-start;z-index:3}

/* Dobozos fel: jobb-fent (atlo folott) — clip degeneralt csucs: TISZTA atlos wipe nyitaskor */
.half--can{clip-path:polygon(55% 0,100% 0,100% 100%,46% 100%)}
/* Aurora FEL-PANEL: a jobb bg a jobb PANELT fedi (~60%), cover, nincs zoom */
.half--can .half__bg{left:auto;right:0;width:60%;transform:none}
.half--can .half__bg img{object-position:62% 42%}
/* ref scrimR: lokalis folt a jobb-felso sarokba (szoveg mogott) */
.half--can .half__scrim{background:linear-gradient(255deg,rgba(10,9,8,.82) 8%,rgba(10,9,8,.30) 34%,transparent 55%)}
.half--can .half__content{top:clamp(3.6rem,8vh,6rem);right:var(--pad);text-align:right;align-items:flex-end;z-index:3}

/* TEASER FADE (ugyfel-keres 07-13): mindket kep erosen elhalvanyitva + finom blur, hogy ne latsszon
   pontosan, mi ez. scale(1.04) a blur-szelek elrejtesere (a .half overflow:hidden vagja). */
.half--bottle .half__bg img,.half--can .half__bg img{filter:brightness(.42) saturate(.55) blur(2.5px);transform:scale(1.04)}

/* atlos arany varrat — SVG, pontos sarok-sarok */
.seam{position:absolute;inset:0;z-index:3;width:100%;height:100%;pointer-events:none}

/* kozep felirat */
.landing__center{position:absolute;z-index:4;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:max-content;max-width:90vw}
.landing__brand{font-family:var(--font-body);letter-spacing:.5em;font-size:.7rem;text-transform:uppercase;color:var(--ink);opacity:.85}
.landing__prompt{font-family:var(--font-display);font-style:normal;font-size:clamp(1.1rem,2.2vw,1.7rem);color:var(--ink);margin-top:.5rem}
.landing__hint{font-family:var(--font-body);letter-spacing:.26em;font-size:.62rem;text-transform:uppercase;color:var(--muted);margin-top:1.1rem}
.landing__divider{width:1px;height:2.4rem;margin:.8rem auto 0;background:linear-gradient(var(--gold-bright),transparent)}
/* ============ B BUILD — TABLET (768-1023): diagonal marad, headline-skala le, crop-recheck ============ */
@media(min-width:768px) and (max-width:1023px){
  .half--bottle .slogan__img,.half--can .slogan__img{width:min(30vw,340px)}
  .half--bottle .half__bg{transform:none}   /* fel-panel cover, nincs nagyitas (elesseg) */
  .half--can .half__bg{transform:none}
}

/* ============ B BUILD — MOBIL STACK (<768): a diagonal szetbomlik KET teljes szelessegu, egymas ala rakott felre (750 felul) ============ */
@media(max-width:767px){
  /* a fixed inset:0 landing = a viewport; a felek abszolut, top/bottom %-inszettel felezve (a containing block magassagahoz merve) -> determinista, nincs height:% / viewport-unit / grid-1fr kvirk */
  .js .landing{display:block!important}
  .seam{display:none!important}
  .half{position:absolute!important;left:0!important;right:0!important;width:auto;height:auto;
    min-height:0;overflow:hidden;clip-path:none!important;z-index:auto!important}
  .half--bottle{top:0!important;bottom:50%!important;border-bottom:1px solid rgba(231,181,63,.5)}
  .half--can{top:50%!important;bottom:0!important}
  .half__bg{transform:none!important;inset:0!important;width:auto!important}   /* mobilon full-width stacked (a desktop fel-panel width feloldva) */
  /* recrop a stack-hez: alany + termek frame-ben, tomorebb kivagas */
  /* bottle: a palack a hf-forras kozep-jobb also reszen -> object-position kozep-jobbra + kicsit le, hogy a palack + ferfi+parduc a kartyaba essen (Aurora comp-note) */
  .half--bottle .half__bg img{object-position:50% 46%;filter:brightness(.42) saturate(.55) blur(2.2px)}
  .half--can .half__bg img{object-position:52% 30%;filter:brightness(.42) saturate(.55) blur(2.2px)}
  /* LOKALIS scrim a szoveg mogott, nem globalis sotetites. bottle: FONT scrim (szoveg felul, a baked ICON Spirante IX lockup ALUL marad, nem utkozik). can: LENT. */
  .half--bottle .half__scrim{background:linear-gradient(180deg,rgba(10,9,8,.93) 0%,rgba(10,9,8,.55) 34%,rgba(10,9,8,0) 64%)!important;opacity:1}
  .half--can .half__scrim{background:linear-gradient(0deg,rgba(10,9,8,.92) 0%,rgba(10,9,8,.55) 32%,rgba(10,9,8,0) 62%)!important;opacity:1}
  /* 2-osztalyos szelektor, hogy a can jobb-igazitasat (line 209) is felulirja */
  .half--bottle .half__content,.half--can .half__content{position:absolute;left:clamp(1.2rem,5vw,1.8rem);right:clamp(1.2rem,5vw,1.8rem);
    max-width:none;text-align:left;align-items:flex-start;gap:.45rem}
  .half--bottle .half__content{top:clamp(1.3rem,4vh,2rem);bottom:auto}   /* bal-FONT, a baked lockup fole */
  .half--can .half__content{bottom:clamp(1.4rem,4vh,2.2rem);top:auto}    /* bal-ALUL */
  .half--bottle .slogan__img,.half--can .slogan__img{width:min(58vw,270px)}
  .half--can .slogan__img{margin-left:0}
}

/* landing belepo (CSS, .js prefix) */
.js .landing .half__content{opacity:0;transform:translateY(22px)}
.js .landing.is-in .half__content{opacity:1;transform:none;transition:opacity 1s var(--ease) .25s,transform 1s var(--ease) .25s}
.js .landing .landing__center{opacity:0}
.js .landing.is-in .landing__center{opacity:1;transition:opacity 1.1s var(--ease) .5s}
.js .landing .seam line{stroke-dashoffset:1}

/* COMING SOON — arany kozepfelirat (Cinzel), diszkret sotet scrim-platen, hogy NE vagja az arcokat/termekeket */
.landing__center::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:min(170%,58rem);height:380%;z-index:-1;border-radius:50%;
  background:radial-gradient(closest-side,rgba(8,7,6,.66),rgba(8,7,6,.34) 54%,transparent 78%)}
.landing__coming{font-family:var(--font-display);font-weight:700;text-transform:uppercase;color:var(--gold-bright);
  font-size:clamp(2.7rem,6.6vw,5.7rem);letter-spacing:.12em;line-height:1;margin-top:.8rem;
  text-shadow:0 2px 28px rgba(8,7,6,.75),0 0 2px rgba(8,7,6,.6)}
.landing__date{font-family:var(--font-body);font-weight:400;font-size:clamp(.82rem,1.3vw,1.02rem);letter-spacing:.26em;
  text-transform:uppercase;color:var(--ink);opacity:.85;margin-top:1.15rem}
@media(max-width:767px){
  .landing__center{display:block!important;z-index:6;width:max-content;max-width:92vw}
  .landing__center::before{width:140%;height:320%}
  .landing__brand{color:var(--ink);opacity:.92}
  .landing__coming{font-size:clamp(1.65rem,7vw,2.4rem);margin-top:.5rem;letter-spacing:.08em}
  .landing__date{font-size:.7rem;letter-spacing:.2em;margin-top:.85rem}
}
</style>

<body>

<!-- LOADER + AGE-GATE (ITEM 8) -->
<div class="loader">
  <div class="loader__mark">
    <div class="lo-brand">Icon Spirante</div>
    <div class="lo-ix">IX</div>
    <div class="loader__bar"><i></i></div>

    <!-- KORKAPU — szuletesi datum (ev / honap / nap) -->
    <form class="agegate" id="ageGate" novalidate hidden>
      <p class="agegate__lead">Add meg a születési dátumodat a belépéshez.</p>
      <div class="agegate__fields">
        <label class="agegate__f">
          <span>Év</span>
          <input id="ag-year" class="agegate__in" type="text" inputmode="numeric" autocomplete="off"
                 maxlength="4" placeholder="ÉÉÉÉ" aria-label="Születési év, négy számjegy">
        </label>
        <label class="agegate__f">
          <span>Hónap</span>
          <input id="ag-month" class="agegate__in" type="text" inputmode="numeric" autocomplete="off"
                 maxlength="2" placeholder="HH" aria-label="Születési hónap">
        </label>
        <label class="agegate__f">
          <span>Nap</span>
          <input id="ag-day" class="agegate__in" type="text" inputmode="numeric" autocomplete="off"
                 maxlength="2" placeholder="NN" aria-label="Születési nap">
        </label>
      </div>
      <p class="agegate__err" id="ag-err" role="alert" aria-live="assertive"></p>
      <button class="agegate__btn" id="ag-submit" type="submit">Belépés</button>
      <p class="agegate__legal">Csak 18 éven felülieknek. A túlzott alkoholfogyasztás károsítja az egészséget.</p>
    </form>
  </div>
</div>

<!-- =========================================================
     SPLIT — statikus (nincs interakcio, nincs belepes)
     ========================================================= -->
<section class="landing" aria-label="ICON Spirante IX, hamarosan">

  <!-- JOBB fel: szlogen "Pure taste. Iconic moments." (teaser-fade kep, minden regi felirat leveve) -->
  <div class="half half--can" aria-hidden="true">
    <div class="half__bg"><picture>
      <source type="image/avif" sizes="60vw" srcset="media/coming-split-right.avif">
      <source type="image/webp" sizes="60vw" srcset="media/coming-split-right.webp">
      <img src="media/coming-split-right.jpg" alt="ICON Spirante IX, hamarosan" fetchpriority="high" decoding="async"></picture></div>
    <div class="half__scrim"></div>
    <div class="half__content">
      <img class="slogan__img" src="media/slogan-puretaste.webp" alt="Pure taste. Iconic moments." width="977" height="615" decoding="async">
    </div>
  </div>

  <!-- BAL fel: szlogen "No trends. This is Icon." (meglevo bal keyart, teaser-fade) -->
  <div class="half half--bottle" aria-hidden="true">
    <div class="half__bg"><picture>
      <source media="(min-width:768px)" type="image/avif" sizes="55vw" srcset="media/keyart-750leftW-1000.avif 1000w, media/keyart-750leftW-1750.avif 1750w">
      <source media="(min-width:768px)" type="image/webp" sizes="55vw" srcset="media/keyart-750leftW-1000.webp 1000w, media/keyart-750leftW-1750.webp 1750w">
      <source media="(min-width:768px)" sizes="55vw" srcset="media/keyart-750leftW-1000.jpg 1000w, media/keyart-750leftW-1750.jpg 1750w">
      <source type="image/avif" sizes="100vw" srcset="media/keyart-750left-550.avif 550w, media/keyart-750left-825.avif 825w, media/keyart-750left-1100.avif 1100w">
      <source type="image/webp" sizes="100vw" srcset="media/keyart-750left-550.webp 550w, media/keyart-750left-825.webp 825w, media/keyart-750left-1100.webp 1100w">
      <img src="media/keyart-750left-1100.jpg" sizes="100vw" srcset="media/keyart-750left-550.jpg 550w, media/keyart-750left-825.jpg 825w, media/keyart-750left-1100.jpg 1100w" alt="ICON Spirante IX 750 ml, férfi fekete párduccal és a Prestige üveggel" fetchpriority="high" decoding="async"></picture></div>
    <div class="half__scrim"></div>
    <div class="half__content">
      <img class="slogan__img" src="media/slogan-notrends.webp" alt="No trends. This is Icon." width="956" height="605" decoding="async">
    </div>
  </div>

  <!-- atlos arany varrat -->
  <svg class="seam" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
    <line x1="55" y1="0" x2="46" y2="100" stroke="#C9A24B" stroke-width="7" stroke-opacity="0.32" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    <line x1="55" y1="0" x2="46" y2="100" stroke="#E7C877" stroke-width="2.4" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
  </svg>

  <!-- kozep: brand eyebrow + COMING SOON -->
  <div class="landing__center">
    <div class="landing__brand">Icon Spirante IX</div>
    <div class="landing__coming">Coming Soon</div>
    <div class="landing__date">(July 20, 2026)</div>
  </div>
</section>

<script>
(function(){
  "use strict";
  var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;

  var loaded=false, loaderEl=document.querySelector('.loader'), bar=document.querySelector('.loader__bar i');
  var STORAGE_KEY='spirante_age_ok', STORAGE_VAL='1';
  var ageOk=false;
  try{ ageOk = localStorage.getItem(STORAGE_KEY)===STORAGE_VAL; }catch(e){ ageOk=false; }

  function landingIn(){ var l=document.querySelector('.landing'); if(l) l.classList.add('is-in'); }
  function dismissLoader(){
    if(loaded) return; loaded=true;
    if(loaderEl){ loaderEl.classList.add('is-done'); setTimeout(function(){ if(loaderEl&&loaderEl.parentNode) loaderEl.parentNode.removeChild(loaderEl); },800); }
    landingIn();
  }
  function finishLoad(){ if(document.body.classList.contains('age-locked')) return; dismissLoader(); }

  /* ===== KORKAPU LOGIKA (valtozatlan validacio) ===== */
  var gateEl=document.getElementById('ageGate');
  var elY=document.getElementById('ag-year'), elM=document.getElementById('ag-month'), elD=document.getElementById('ag-day');
  var elErr=document.getElementById('ag-err'), elSubmit=document.getElementById('ag-submit');
  var MSG={
    empty:'Kérjük, töltsd ki mind a három mezőt (év, hónap, nap).',
    format:'Csak számokat adj meg: év (4 jegy), hónap, nap.',
    unreal:'Nem valós életkor.',
    underage:'18 éven aluliak nem léphetnek be.'
  };
  function showGate(){
    if(!gateEl) return;
    gateEl.removeAttribute('hidden');
    if(loaderEl) loaderEl.classList.add('age-gate-on');
    document.body.classList.add('age-locked');
    setTimeout(function(){ if(elY) elY.focus(); }, 60);
  }
  function passGate(){
    try{ localStorage.setItem(STORAGE_KEY, STORAGE_VAL); }catch(e){}
    document.body.classList.remove('age-locked');
    dismissLoader();
  }
  function validCalendarDate(y,m,d){
    if(m<1||m>12||d<1||d>31) return false;
    var dt=new Date(y, m-1, d);
    return dt.getFullYear()===y && dt.getMonth()===(m-1) && dt.getDate()===d;
  }
  function computeAge(y,m,d){
    var now=new Date();
    var age=now.getFullYear()-y;
    var mm=now.getMonth()+1, dd=now.getDate();
    if(mm<m || (mm===m && dd<d)) age--;
    return age;
  }
  function setBad(bad){ [elY,elM,elD].forEach(function(el){ if(el){ el.classList.toggle('is-bad', !!bad); } }); }
  function evaluate(){
    var ry=(elY&&elY.value||'').trim(), rm=(elM&&elM.value||'').trim(), rd=(elD&&elD.value||'').trim();
    if(!ry || !rm || !rd){ elErr.textContent=MSG.empty; setBad(true); return; }
    if(!/^\d{4}$/.test(ry) || !/^\d{1,2}$/.test(rm) || !/^\d{1,2}$/.test(rd)){ elErr.textContent=MSG.format; setBad(true); return; }
    var y=parseInt(ry,10), m=parseInt(rm,10), d=parseInt(rd,10);
    var now=new Date();
    var minYear=now.getFullYear()-120;
    if(!validCalendarDate(y,m,d)){ elErr.textContent=MSG.unreal; setBad(true); return; }
    var birth=new Date(y, m-1, d);
    if(birth.getTime() > now.getTime()){ elErr.textContent=MSG.unreal; setBad(true); return; }
    if(y < minYear){ elErr.textContent=MSG.unreal; setBad(true); return; }
    var age=computeAge(y,m,d);
    if(age>120){ elErr.textContent=MSG.unreal; setBad(true); return; }
    if(age<18){ elErr.textContent=MSG.underage; setBad(true); return; }
    elErr.textContent=''; setBad(false);
    passGate();
  }
  if(gateEl){
    gateEl.addEventListener('submit', function(e){ e.preventDefault(); evaluate(); });
    function autoAdv(el,next){
      if(!el) return;
      el.addEventListener('input', function(){
        el.value=el.value.replace(/\D/g,'');
        if(el.value.length>=el.maxLength && next) next.focus();
      });
    }
    autoAdv(elY, elM); autoAdv(elM, elD); autoAdv(elD, null);
    [elY,elM,elD].forEach(function(el){ if(el) el.addEventListener('keydown', function(ev){ if(ev.key==='Enter'){ ev.preventDefault(); evaluate(); } }); });
  }

  /* ---- LOADER vezerles ---- */
  function fillBar(){ if(bar){ bar.style.transition='width .9s ease'; bar.style.width='100%'; } }
  if(ageOk){
    addEventListener('load', function(){ fillBar(); setTimeout(finishLoad, reduce?0:280); });
    setTimeout(finishLoad, 3600);
  }else{
    addEventListener('load', function(){ fillBar(); setTimeout(showGate, reduce?0:520); });
    setTimeout(function(){ if(!loaded && !document.body.classList.contains('age-locked')) showGate(); }, 3600);
  }
})();
</script>
</body>
</html>
